<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GTO Playbook · Admin Login</title>
  <link rel="stylesheet" href="/admin/static/css/theme.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background:
        radial-gradient(900px 500px at 15% 0%, rgba(99, 102, 241, 0.18), transparent 60%),
        radial-gradient(800px 500px at 100% 100%, rgba(139, 92, 246, 0.14), transparent 55%),
        var(--bg);
      padding: 20px;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 36px 34px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-lg);
    }
    .login-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 26px;
    }
    .login-brand .logo {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--brand), #8b5cf6);
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 800;
      font-size: 18px;
    }
    .login-brand h1 {
      font-size: 18px;
      font-weight: 700;
    }
    .login-brand .sub {
      font-size: 12px;
      color: var(--text-dim);
    }
    .login-card label {
      display: block;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 7px;
      font-weight: 500;
    }
    .login-card .field {
      margin-bottom: 18px;
    }
    .login-card button[type='submit'] {
      width: 100%;
      margin-top: 6px;
      padding: 11px;
      font-size: 15px;
      font-weight: 600;
    }
    .error {
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid color-mix(in srgb, var(--c-red) 40%, transparent);
      color: #fca5a5;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin-bottom: 18px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-brand">
      <div class="logo">G</div>
      <div>
        <h1>GTO Playbook</h1>
        <div class="sub">Admin Dashboard</div>
      </div>
    </div>
    <div class="error" id="error">아이디 또는 비밀번호가 올바르지 않습니다.</div>
    <form method="POST" action="/admin/login">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autocomplete="username" autofocus />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn btn-primary">로그인</button>
    </form>
  </div>
  <script>
    if (new URLSearchParams(location.search).get('error') === '1') {
      document.getElementById('error').style.display = 'block';
    }
  </script>
</body>
</html>
