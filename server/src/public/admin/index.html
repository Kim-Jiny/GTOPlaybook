<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GTO Playbook · Admin</title>
  <link rel="stylesheet" href="/admin/static/css/theme.css" />
  <script>
    // Apply saved theme before paint to avoid flash.
    (function () {
      var t = localStorage.getItem('admin-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="logo">G</div>
        <div>
          <h1>GTO Playbook</h1>
          <div class="sub">Admin Panel</div>
        </div>
      </div>
      <div class="nav-items">
        <div class="nav-section-label">Menu</div>
        <button class="nav-item active" data-route="dashboard">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0h4"/></svg>
          Dashboard
        </button>
        <button class="nav-item" data-route="users">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
          Users
        </button>
        <button class="nav-item" data-route="inquiries">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
          Inquiries
          <span class="pill" id="nav-pending" style="display:none">0</span>
        </button>
      </div>
      <div class="sidebar-footer">
        <button class="nav-item" id="theme-toggle">
          <svg id="theme-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
          <span id="theme-label">라이트 모드</span>
        </button>
        <form method="POST" action="/admin/logout" style="margin:0">
          <button class="nav-item" type="submit">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
            로그아웃
          </button>
        </form>
      </div>
    </nav>
    <div class="backdrop" id="backdrop"></div>

    <!-- Main -->
    <div class="main">
      <header class="topbar">
        <button class="menu-btn" id="menu-btn" aria-label="menu">
          <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <div>
          <h2 id="page-title">Dashboard</h2>
          <div class="sub" id="page-sub">서비스 현황 한눈에 보기</div>
        </div>
        <div class="topbar-spacer"></div>
        <div class="topbar-actions">
          <div class="admin-chip">
            <div class="avatar" id="admin-avatar">A</div>
            <span class="name" id="admin-name">admin</span>
          </div>
        </div>
      </header>

      <div class="content">
        <!-- Dashboard -->
        <section class="section active" id="section-dashboard">
          <div class="stats-grid" id="stats"></div>
          <div class="grid-2">
            <div class="panel">
              <div class="panel-head">
                <h4>가입 추이</h4>
                <span class="hint">최근 30일</span>
              </div>
              <div class="chart-box"><canvas id="signup-chart"></canvas></div>
            </div>
            <div class="panel">
              <div class="panel-head">
                <h4>문의 상태</h4>
                <span class="hint" id="inq-total-hint"></span>
              </div>
              <div class="chart-box sm"><canvas id="status-chart"></canvas></div>
            </div>
          </div>
        </section>

        <!-- Users -->
        <section class="section" id="section-users">
          <div class="toolbar">
            <div class="search">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
              <input type="search" id="user-search" placeholder="이메일, 이름, ID 검색…" />
            </div>
            <div class="spacer"></div>
            <button class="btn btn-ghost btn-sm" id="users-export">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
              CSV 내보내기
            </button>
          </div>
          <div class="table-wrap">
            <div class="table-scroll">
              <table>
                <thead>
                  <tr>
                    <th>User</th>
                    <th>Email</th>
                    <th class="sortable" data-sort="created_at">가입일 <span class="arrow">▼</span></th>
                    <th class="sortable" data-sort="last_active_at">최근 활동 <span class="arrow"></span></th>
                    <th>문의</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="users-tbody"></tbody>
              </table>
              <div class="empty" id="users-empty" style="display:none">조건에 맞는 사용자가 없습니다</div>
            </div>
            <div class="pagination" id="users-pagination"></div>
          </div>
        </section>

        <!-- Inquiries -->
        <section class="section" id="section-inquiries">
          <div class="toolbar">
            <div class="tabs" id="inq-tabs">
              <button class="tab active" data-filter="">전체</button>
              <button class="tab" data-filter="pending">대기</button>
              <button class="tab" data-filter="in_progress">처리중</button>
              <button class="tab" data-filter="replied">답변완료</button>
            </div>
            <div class="search">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
              <input type="search" id="inq-search" placeholder="제목, 내용, 사용자 검색…" />
            </div>
            <div class="spacer"></div>
            <button class="btn btn-ghost btn-sm" id="inq-export">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
              CSV 내보내기
            </button>
          </div>
          <div class="table-wrap">
            <div class="table-scroll">
              <table>
                <thead>
                  <tr>
                    <th>#</th>
                    <th>사용자</th>
                    <th>제목</th>
                    <th>상태</th>
                    <th class="sortable" data-sort="created_at">접수일 <span class="arrow">▼</span></th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="inquiries-tbody"></tbody>
              </table>
              <div class="empty" id="inquiries-empty" style="display:none">문의가 없습니다</div>
            </div>
          </div>
        </section>
      </div>
    </div>
  </div>

  <!-- Modal mount -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal"></div>
  </div>

  <!-- Toast mount -->
  <div class="toast-wrap" id="toast-wrap"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
  <script src="/admin/static/js/api.js" defer></script>
  <script src="/admin/static/js/ui.js" defer></script>
  <script src="/admin/static/js/views/dashboard.js" defer></script>
  <script src="/admin/static/js/views/users.js" defer></script>
  <script src="/admin/static/js/views/inquiries.js" defer></script>
  <script src="/admin/static/js/app.js" defer></script>
</body>
</html>
