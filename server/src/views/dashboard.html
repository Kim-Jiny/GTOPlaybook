<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GTO Playbook - Admin Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }
    header {
      background: #1e293b;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #334155;
    }
    header h1 { font-size: 20px; color: #f8fafc; }
    .logout-btn {
      background: #475569;
      color: #e2e8f0;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .logout-btn:hover { background: #64748b; }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: #1e293b;
      border-radius: 10px;
      padding: 20px;
      border: 1px solid #334155;
    }
    .stat-card .label { font-size: 13px; color: #94a3b8; margin-bottom: 4px; }
    .stat-card .value { font-size: 28px; font-weight: 700; color: #f8fafc; }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .tab {
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid #334155;
      background: transparent;
      color: #94a3b8;
      cursor: pointer;
      font-size: 13px;
    }
    .tab.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }

    /* Table */
    .table-wrap {
      background: #1e293b;
      border-radius: 10px;
      border: 1px solid #334155;
      overflow-x: auto;
    }
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      padding: 12px 16px;
      font-size: 12px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid #334155;
    }
    td {
      padding: 12px 16px;
      font-size: 14px;
      border-bottom: 1px solid #1e293b;
    }
    tr:hover td { background: #1a2332; }
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge.pending { background: #854d0e; color: #fde68a; }
    .badge.replied { background: #14532d; color: #86efac; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #1e293b;
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 600px;
      max-height: 80vh;
      overflow-y: auto;
      border: 1px solid #334155;
    }
    .modal h2 { font-size: 18px; margin-bottom: 16px; color: #f8fafc; }
    .modal .field { margin-bottom: 12px; }
    .modal .field-label { font-size: 12px; color: #64748b; margin-bottom: 4px; }
    .modal .field-value { font-size: 14px; color: #e2e8f0; white-space: pre-wrap; }
    .modal textarea {
      width: 100%;
      min-height: 100px;
      padding: 10px;
      border: 1px solid #334155;
      border-radius: 8px;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 14px;
      resize: vertical;
      outline: none;
      font-family: inherit;
    }
    .modal textarea:focus { border-color: #3b82f6; }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 16px;
    }
    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      font-size: 14px;
      cursor: pointer;
      font-weight: 500;
    }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .btn-secondary { background: #334155; color: #e2e8f0; }
    .btn-secondary:hover { background: #475569; }
    .empty { text-align: center; padding: 40px; color: #64748b; }
  </style>
</head>
<body>
  <header>
    <h1>GTO Playbook Admin</h1>
    <form method="POST" action="/admin/logout" style="margin:0">
      <button class="logout-btn" type="submit">Logout</button>
    </form>
  </header>

  <div class="container">
    <div class="stats-grid" id="stats"></div>

    <div class="tabs">
      <button class="tab active" data-filter="">All</button>
      <button class="tab" data-filter="pending">Pending</button>
      <button class="tab" data-filter="replied">Replied</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>User</th>
            <th>Title</th>
            <th>Status</th>
            <th>Date</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="inquiries"></tbody>
      </table>
      <div class="empty" id="empty" style="display:none">No inquiries found</div>
    </div>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h2 id="modal-title"></h2>
      <div class="field">
        <div class="field-label">User</div>
        <div class="field-value" id="modal-user"></div>
      </div>
      <div class="field">
        <div class="field-label">Content</div>
        <div class="field-value" id="modal-content"></div>
      </div>
      <div class="field" id="modal-reply-section" style="display:none">
        <div class="field-label">Admin Reply</div>
        <div class="field-value" id="modal-existing-reply"></div>
      </div>
      <div id="modal-reply-form">
        <div class="field">
          <div class="field-label">Reply</div>
          <textarea id="reply-text" placeholder="Write your reply..."></textarea>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal()">Close</button>
        <button class="btn btn-primary" id="reply-btn" onclick="submitReply()">Send Reply</button>
      </div>
    </div>
  </div>

  <script>
    let currentId = null;
    let currentFilter = '';

    async function loadStats() {
      const res = await fetch('/admin/api/stats');
      const data = await res.json();
      const pending = data.inquiryStats.find(s => s.status === 'pending');
      const replied = data.inquiryStats.find(s => s.status === 'replied');
      document.getElementById('stats').innerHTML = `
        <div class="stat-card"><div class="label">Total Users</div><div class="value">${data.totalUsers}</div></div>
        <div class="stat-card"><div class="label">Total Inquiries</div><div class="value">${data.totalInquiries}</div></div>
        <div class="stat-card"><div class="label">Pending</div><div class="value">${pending ? pending.count : 0}</div></div>
        <div class="stat-card"><div class="label">Replied</div><div class="value">${replied ? replied.count : 0}</div></div>
      `;
    }

    async function loadInquiries() {
      const url = currentFilter ? `/admin/api/inquiries?status=${currentFilter}` : '/admin/api/inquiries';
      const res = await fetch(url);
      const rows = await res.json();
      const tbody = document.getElementById('inquiries');
      const empty = document.getElementById('empty');
      if (rows.length === 0) {
        tbody.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';
      tbody.innerHTML = rows.map(r => `
        <tr>
          <td>${r.id}</td>
          <td>${esc(r.display_name || r.email)}</td>
          <td>${esc(r.title)}</td>
          <td><span class="badge ${r.status}">${r.status}</span></td>
          <td>${new Date(r.created_at).toLocaleDateString('ko-KR')}</td>
          <td><button class="btn btn-secondary" onclick='openModal(${JSON.stringify(r).replace(/'/g, "&#39;")})'>View</button></td>
        </tr>
      `).join('');
    }

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

    function openModal(row) {
      currentId = row.id;
      document.getElementById('modal-title').textContent = row.title;
      document.getElementById('modal-user').textContent = (row.display_name || '') + ' (' + row.email + ')';
      document.getElementById('modal-content').textContent = row.content;

      if (row.admin_reply) {
        document.getElementById('modal-reply-section').style.display = '';
        document.getElementById('modal-existing-reply').textContent = row.admin_reply;
        document.getElementById('modal-reply-form').style.display = 'none';
        document.getElementById('reply-btn').style.display = 'none';
      } else {
        document.getElementById('modal-reply-section').style.display = 'none';
        document.getElementById('modal-reply-form').style.display = '';
        document.getElementById('reply-btn').style.display = '';
        document.getElementById('reply-text').value = '';
      }

      document.getElementById('modal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
      currentId = null;
    }

    async function submitReply() {
      const reply = document.getElementById('reply-text').value.trim();
      if (!reply) return;

      const btn = document.getElementById('reply-btn');
      btn.disabled = true;
      btn.textContent = 'Sending...';

      try {
        const res = await fetch(`/admin/api/inquiries/${currentId}/reply`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ reply }),
        });
        if (res.ok) {
          closeModal();
          loadStats();
          loadInquiries();
        }
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send Reply';
      }
    }

    // Tab click
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentFilter = tab.dataset.filter;
        loadInquiries();
      });
    });

    // Close modal on overlay click
    document.getElementById('modal').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeModal();
    });

    // Init
    loadStats();
    loadInquiries();
  </script>
</body>
</html>
