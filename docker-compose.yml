services:
  gto-playbook:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: gto-playbook
    restart: unless-stopped
    ports:
      - "3006:3000"
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
    depends_on:
      gto-db:
        condition: service_healthy
    networks:
      - app-network

  gto-db:
    image: postgres:16-alpine
    container_name: gto-db
    restart: unless-stopped
    ports:
      - "127.0.0.1:55437:5432"
    environment:
      POSTGRES_USER: gto
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: gto
    volumes:
      - gto-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gto -d gto"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app-network

volumes:
  gto-db-data:

networks:
  app-network:
    external: true
